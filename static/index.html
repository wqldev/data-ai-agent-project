<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI agent 数据分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B1F33'/%3E%3Cpath d='M18 40V24l14 8 14-8v16' fill='none' stroke='%232EC4B6' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <rect width="40" height="40" rx="10" fill="#0B1F33"/>
            <path d="M11 26V14l9 5 9-5v12" fill="none" stroke="#2EC4B6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="19" r="2.2" fill="#F0B429"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>AI agent 数据分析</h1>
          <p>配置 API key, 输入问题, 开始分析</p>
        </div>
      </div>
      <button type="button" class="btn btn-config" id="btnOpenConfig" aria-label="打开模型配置">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.43.34.68.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54c.05.24.26.42.5.42h3.84c.24 0 .45-.18.5-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.25.12.54.02.68-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
        </svg>
        <span>配置</span>
      </button>
    </header>

    <main class="workspace">
      <aside class="history-panel">
        <div class="panel-head">
          <h2>历史任务</h2>
          <button type="button" class="link-btn" id="btnClearHistory" title="清空全部">清空</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
        <p class="history-empty" id="historyEmpty">暂无历史任务</p>
      </aside>

      <section class="analyze-panel">
        <div class="input-block">
          <h2>输入分析问题</h2>
          <div class="ask-row">
            <textarea
              id="questionInput"
              rows="3"
              placeholder="例如：最近半年销售情况怎么样？"
              maxlength="2000"
            ></textarea>
            <button type="button" class="btn btn-primary" id="btnAnalyze">开始分析</button>
          </div>
          <p class="hint">支持趋势、对比、归因、假设等分析类问题。</p>
        </div>

        <div class="process-block">
          <div class="process-head">
            <h3>分析过程</h3>
            <div id="verifyBadge" class="verify-badge hidden" aria-live="polite"></div>
          </div>
          <div class="process-log" id="processLog"></div>
          <article class="report-card hidden" id="reportCard">
            <div class="report-body" id="reportBody"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="configModal" role="dialog" aria-modal="true" aria-labelledby="configTitle">
    <div class="modal">
      <div class="modal-head">
        <h2 id="configTitle">模型配置</h2>
        <button type="button" class="icon-btn" id="btnCloseConfig" aria-label="关闭">×</button>
      </div>
      <p class="modal-desc">
        配置 OpenAI 兼容的 API 服务，支持任何兼容的 LLM 提供商（如 OpenAI、DeepSeek、通义千问等）。
      </p>
      <form id="configForm" class="config-form">
        <label>
          <span>API 地址</span>
          <input type="url" id="cfgApiBase" placeholder="https://api.openai.com/v1" required />
        </label>
        <label>
          <span>API Key</span>
          <input type="password" id="cfgApiKey" placeholder="sk-..." required autocomplete="off" />
        </label>
        <label>
          <span>模型名称</span>
          <input type="text" id="cfgModel" placeholder="gpt-4o-mini" required />
        </label>
        <p class="form-msg" id="configMsg" aria-live="polite"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btnTestApi">测试 API</button>
          <div class="spacer"></div>
          <button type="button" class="btn btn-ghost" id="btnCancelConfig">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
